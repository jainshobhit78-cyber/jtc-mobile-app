name: Build Native Android APK

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Expo Prebuild Android Project
        run: npx expo prebuild --platform android

      - name: Create Assets Directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JavaScript into APK
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Remove Duplicate Resources
        run: |
          # Remove duplicate drawables that cause AAPT merge conflicts
          find android/app/src/main/res/drawable-* -name "*.png" -delete 2>/dev/null || true
          find android/app/src/main/res/raw -name "*.json" -delete 2>/dev/null || true

      - name: Build Native Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1-standalone
          name: JTC B2B App - Standalone APK
          body: |
            Fully standalone native Android APK for JTC Customer B2B portal.
            This APK has the JS bundle embedded — no dev server needed.
            Just install and run.
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
